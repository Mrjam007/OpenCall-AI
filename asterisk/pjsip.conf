[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[3cx-trunk]
type=endpoint
transport=transport-udp
context=from-3cx
disallow=all
allow=ulaw
aors=3cx-trunk

[3cx-trunk]
type=aor
contact=sip:192.168.1.100:5060 ; Replace with 3CX IP

[3cx-trunk]
type=identify
endpoint=3cx-trunk
match=192.168.1.100 ; Replace with 3CX IP
